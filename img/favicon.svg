  <line x1="38" y1="46" x2="38" y2="50" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Inner circuit lines -->
  <circle cx="29" cy="29" r="1.5" fill="#7C3AED"/>
  <circle cx="35" cy="29" r="1.5" fill="#7C3AED"/>
  <circle cx="29" cy="35" r="1.5" fill="#7C3AED"/>
  <circle cx="35" cy="35" r="1.5" fill="#10B981"/>
  <line x1="29" y1="29" x2="35" y2="35" stroke="#7C3AED" stroke-width="1.2"/>

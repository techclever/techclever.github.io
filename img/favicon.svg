  <line x1="14" y1="26" x2="18" y2="26" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="18" y2="32" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="38" x2="18" y2="38" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="26" x2="50" y2="26" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="50" y2="32" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="38" x2="50" y2="38" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="14" x2="26" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="32" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="14" x2="38" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

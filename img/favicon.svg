  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Circuit chip icon -->
  <rect x="18" y="18" width="28" height="28" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
  <rect x="24" y="24" width="16" height="16" rx="2" fill="#fff" opacity="0.9"/>
